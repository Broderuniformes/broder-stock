function gf(sku){var b=sku.toUpperCase().replace(/\d+$/,"");return FK[b]||null;}
window.openFoto=function(u){document.getElementById("foto-img").src=u;document.getElementById("foto-bg").style.display="flex";};
window.closeFoto=function(){document.getElementById("foto-bg").style.display="none";};
var S=JSON.parse(document.getElementById("stock-data").textContent);
var nid=5000,pend=null,SL=["Auto","Muestrario","Oferta"];
window.showScr=function(n){["c","r","v"].forEach(function(s){document.getElementById("scr-"+s).classList.remove("vis");});document.getElementById("scr-"+n).classList.add("vis");document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("act");});var idx={"c":0,"r":1,"v":2}[n];document.querySelectorAll(".nav button")[idx].classList.add("act");if(n==="c")fil();if(n==="v")rendV();};
function lcls(l){return l==="Auto"?"bA":l==="Muestrario"?"bM":l.indexOf("ep")>=0?"bD":"bO";}
window.fil=function(){var mod=document.getElementById("fm").value,tal=document.getElementById("ft").value,loc=document.getElementById("fl").value,q=(document.getElementById("q").value||"").toLowerCase();var f=S.filter(function(e){return e.qty>0;});if(mod)f=f.filter(function(e){return e.modelo===mod;});if(tal)f=f.filter(function(e){return e.talle===tal;});if(loc)f=f.filter(function(e){return e.loc===loc;});if(q)f=f.filter(function(e){return(e.sku||"").toLowerCase().indexOf(q)>=0||(e.color||"").toLowerCase().indexOf(q)>=0||(e.modelo||"").toLowerCase().indexOf(q)>=0;});document.getElementById("rh").textContent=f.length+" resultado"+(f.length!==1?"s":"");var grp={};f.forEach(function(e){if(!grp[e.sku])grp[e.sku]={sku:e.sku,mod:e.modelo,tal:e.talle,col:e.color,desc:e.desc,locs:[]};grp[e.sku].locs.push({loc:e.loc,qty:e.qty,id:e.id});});var items=Object.values(grp),el=document.getElementById("res"),out="";if(!items.length){el.innerHTML="<div class=\"empty\">Sin resultados</div>";return;}items.forEach(function(g){var foto=gf(g.sku);var imgH=foto?"<img src=\""+foto+"\" class=\"card-img\" onclick=\"openFoto(this.src)\">":"<div class=\"card-img-ph\">&#128247;</div>";var bdg="";g.locs.forEach(function(l){bdg+="<span class=\"badge "+lcls(l.loc)+"\">"+l.loc+" x"+l.qty+"</span>";});var ctlH="";g.locs.forEach(function(l){if(SL.indexOf(l.loc)<0)return;var sid="n"+g.sku.replace(/[^a-zA-Z0-9]/g,"Z")+l.loc.replace(/[^a-zA-Z]/g,"Z");ctlH+="<div class=\"ctl\"><span class=\"ctl-lbl\">"+l.loc+"</span><button class=\"qb\" data-sku=\""+g.sku+"\" data-loc=\""+l.loc+"\" data-d=\"-1\" onclick=\"adj(this)\">-</button><span class=\"qn\" id=\""+sid+"\">"+l.qty+"</span><button class=\"qb\" data-sku=\""+g.sku+"\" data-loc=\""+l.loc+"\" data-d=\"1\" onclick=\"adj(this)\">+</button></div>";});var col=(g.col&&g.col!=="nan")?" - "+g.col:"";var dsc=(g.desc&&g.desc!=="nan"&&g.desc!=="")?("<div style=\"font-size:11px;color:#aaa;margin-top:2px\">"+g.desc+"</div>"):"";out+="<div class=\"card\"><div class=\"card-top\"><div><div class=\"card-sku\">"+g.sku+"</div><div class=\"card-sub\">"+(g.mod||"")+" T."+(g.tal||"")+col+"</div>"+dsc+"</div>"+imgH+"</div><div class=\"badges\">"+bdg+"</div>"+(ctlH?"<div class=\"ctls\">"+ctlH+"</div>":"")+"</div>";});el.innerHTML=out;};
window.adj=function(btn){var sku=btn.getAttribute("data-sku"),loc=btn.getAttribute("data-loc"),d=parseInt(btn.getAttribute("data-d"));var e=S.find(function(x){return x.sku===sku&&x.loc===loc;});if(!e)return;var n=e.qty+d;if(n<0){toast("Sin stock");return;}e.qty=n;var sid="n"+sku.replace(/[^a-zA-Z0-9]/g,"Z")+loc.replace(/[^a-zA-Z]/g,"Z");var el=document.getElementById(sid);if(el)el.textContent=n;toast((d>0?"+1":"-1")+" "+sku+" en "+loc);};
window.reponer=function(){var sku=(document.getElementById("rsku").value||"").trim().toUpperCase();var qty=Math.max(1,parseInt(document.getElementById("rqty").value)||1);var loc=document.getElementById("rloc").value;if(!sku){toast("Ingresa el SKU");return;}var ex=S.find(function(e){return e.sku.toUpperCase()===sku&&e.loc===loc;});if(ex){ex.qty+=qty;}else{var ref=S.find(function(e){return e.sku.toUpperCase()===sku;});var modelo="",talle="",color="";if(ref){modelo=ref.modelo;talle=ref.talle;color=ref.color;}else{var m=sku.match(/(\d)$/);talle=m?m[1]:"";if(sku.indexOf("1043BJ")===0)modelo="1043/BJ";else if(sku.indexOf("1030")===0)modelo="1030";else if(sku.indexOf("1040")===0)modelo="1040";else if(sku.indexOf("1041")===0)modelo="1041";else if(sku.indexOf("1043")===0)modelo="1043";else if(sku.indexOf("1044")===0)modelo="1044";else if(sku.indexOf("1047")===0)modelo="1047";else if(sku.indexOf("4046")===0)modelo="4046";}S.push({id:nid++,sku:sku,modelo:modelo,talle:talle,color:color,desc:"",loc:loc,qty:qty});}var bar=document.getElementById("ok-bar");bar.textContent="OK: "+qty+" x "+sku+" en "+loc;bar.classList.add("show");setTimeout(function(){bar.classList.remove("show");},4000);document.getElementById("rsku").value="";document.getElementById("rqty").value="1";};
window.rendV=function(){var q=(document.getElementById("vq").value||"").toLowerCase();var tA=S.filter(function(e){return e.loc==="Auto";}).reduce(function(a,e){return a+e.qty;},0);var tM=S.filter(function(e){return e.loc==="Muestrario";}).reduce(function(a,e){return a+e.qty;},0);var tD=S.filter(function(e){return e.loc.indexOf("ep")>=0;}).reduce(function(a,e){return a+e.qty;},0);document.getElementById("stats").innerHTML="<div class=\"stat\"><div class=\"stat-n\">"+tA+"</div><div class=\"stat-l\">Auto</div></div><div class=\"stat\"><div class=\"stat-n\">"+tM+"</div><div class=\"stat-l\">Muestrario</div></div><div class=\"stat\"><div class=\"stat-n\">"+tD+"</div><div class=\"stat-l\">Deposito</div></div>";var items=S.filter(function(e){return e.qty>0&&SL.indexOf(e.loc)>=0;}).filter(function(e){return !q||(e.sku+e.color+e.modelo).toLowerCase().indexOf(q)>=0;});if(!items.length){document.getElementById("vlist").innerHTML="<div class=\"empty\">Sin articulos</div>";return;}var out="";items.forEach(function(e){var foto=gf(e.sku);var img=foto?"<img src=\""+foto+"\" onclick=\"openFoto(this.src)\">":"<div class=\"si-ph\">&#128247;</div>";var col=(e.color&&e.color!=="nan")?" - "+e.color:"";out+="<div class=\"si\">"+img+"<div class=\"si-info\"><div class=\"si-sku\">"+e.sku+"</div><div class=\"si-sub\">"+(e.modelo||"")+" T."+(e.talle||"")+col+" - "+e.loc+" - "+e.qty+" unid.</div></div><button class=\"btn-sell\" onclick=\"initSell("+e.id+")\">Vendido</button></div>";});document.getElementById("vlist").innerHTML=out;};
window.initSell=function(id){var item=S.find(function(e){return e.id===id;});if(!item)return;pend=id;var locs=[];S.forEach(function(e){if(e.sku===item.sku&&e.qty>0&&SL.indexOf(e.loc)>=0&&locs.indexOf(e.loc)<0)locs.push(e.loc);});if(locs.length===1){doSell(id,locs[0]);return;}document.getElementById("mod-ttl").textContent="Desde donde salio? "+item.sku;var opts="";locs.forEach(function(l){opts+="<button class=\"modal-btn\" onclick=\"doSell("+id+",+l+)\">"+l+"</button>";});document.getElementById("mod-opts").innerHTML=opts;document.getElementById("modal").style.display="flex";};
window.doSell=function(id,loc){closeMod();var item=S.find(function(e){return e.id===id;});if(!item)return;var t=S.find(function(e){return e.sku===item.sku&&e.loc===loc&&e.qty>0;});if(!t){toast("Sin stock");return;}t.qty--;toast("Vendido: "+item.sku+" desde "+loc);rendV();};
window.closeMod=function(){document.getElementById("modal").style.display="none";};
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
fil();
});
