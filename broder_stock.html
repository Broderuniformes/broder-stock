<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Broder Stock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;padding:12px;max-width:420px;margin:0 auto}
h1{font-size:16px;font-weight:700;padding:10px 0 12px;border-bottom:1px solid #ddd;margin-bottom:12px}
.nav{display:flex;gap:6px;margin-bottom:14px}
.nav button{flex:1;padding:10px 4px;font-size:13px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#666;font-weight:500;cursor:pointer}
.nav button.act{background:#dbeafe;color:#1d4ed8;font-weight:700;border-color:transparent}
.scr{display:none}.scr.vis{display:block}
.row{display:flex;gap:8px;margin-bottom:10px}
select,input[type=text],input[type=number]{flex:1;font-size:14px;padding:9px 10px;border-radius:9px;border:1px solid #ddd;background:#fff;width:100%}
#rh{font-size:12px;color:#888;margin-bottom:8px;min-height:16px}
.card{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-sku{font-size:15px;font-weight:700;color:#111}
.card-sub{font-size:12px;color:#888;margin-top:2px}
.card-img{width:58px;height:58px;border-radius:9px;object-fit:cover;border:1px solid #eee;cursor:pointer;flex-shrink:0}
.card-img-ph{width:58px;height:58px;border-radius:9px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid #eee}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.bA{background:#dbeafe;color:#1e40af}.bM{background:#dcfce7;color:#166534}
.bD{background:#fef3c7;color:#92400e}.bO{background:#fee2e2;color:#991b1b}
.ctls{display:flex;gap:6px;margin-top:9px;padding-top:8px;border-top:1px solid #f0f0f0;flex-wrap:wrap}
.ctl{display:flex;align-items:center;gap:5px;background:#f8f8f8;border-radius:8px;padding:4px 8px}
.ctl-lbl{font-size:11px;color:#666;font-weight:600}
.qb{width:30px;height:30px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:18px;font-weight:700;cursor:pointer}
.qn{font-size:14px;font-weight:700;min-width:20px;text-align:center;display:inline-block}
.empty{text-align:center;padding:40px 12px;color:#bbb;font-size:14px}
.confirm{background:#dcfce7;border:1px solid #bbf7d0;border-radius:10px;padding:12px;margin-bottom:12px;font-size:14px;color:#166534;font-weight:600;display:none}
.confirm.show{display:block}
label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px}
.sec{margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn-main{width:100%;padding:14px;font-size:15px;font-weight:700;background:#1d4ed8;color:#fff;border:none;border-radius:12px;cursor:pointer;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#fff;border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-n{font-size:24px;font-weight:700}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.si{display:flex;align-items:center;background:#fff;border-radius:12px;padding:10px;margin-bottom:7px;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.si img{width:42px;height:42px;border-radius:8px;object-fit:cover;cursor:pointer;flex-shrink:0;border:1px solid #eee}
.si-ph{width:42px;height:42px;border-radius:8px;background:#f3f4f6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.si-info{flex:1;min-width:0}
.si-sku{font-size:13px;font-weight:700;color:#111}
.si-sub{font-size:11px;color:#888;margin-top:2px}
.btn-sell{background:#fee2e2;color:#b91c1c;border:none;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:50}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 30px;width:100%}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-btn{display:block;padding:13px;border-radius:10px;border:1px solid #eee;background:#fff;width:100%;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left}
.btn-cancel{width:100%;padding:12px;background:#f3f4f6;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600}
.foto-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px}
.foto-bg img{max-width:100%;max-height:85vh;border-radius:12px;object-fit:contain}
.foto-x{position:absolute;top:12px;right:12px;width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:50%;border:none;color:#fff;font-size:22px;cursor:pointer}
.sw{position:relative;margin-bottom:10px}
.sw input{padding-left:32px !important}
.sw-i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
</style>
</head>

var S=JSON.parse(document.getElementById("stock-data").textContent);
var nid=5000,pend=null,SL=["Auto","Muestrario","Oferta"];
window.showScr=function(n){["c","r","v"].forEach(function(s){document.getElementById("scr-"+s).classList.remove("vis");});document.getElementById("scr-"+n).classList.add("vis");document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("act");});var idx={"c":0,"r":1,"v":2}[n];document.querySelectorAll(".nav button")[idx].classList.add("act");if(n==="c")fil();if(n==="v")rendV();};
function lcls(l){return l==="Auto"?"bA":l==="Muestrario"?"bM":l.indexOf("ep")>=0?"bD":"bO";}
window.fil=function(){var mod=document.getElementById("fm").value,tal=document.getElementById("ft").value,loc=document.getElementById("fl").value,q=(document.getElementById("q").value||"").toLowerCase();var f=S.filter(function(e){return e.qty>0;});if(mod)f=f.filter(function(e){return e.modelo===mod;});if(tal)f=f.filter(function(e){return e.talle===tal;});if(loc)f=f.filter(function(e){return e.loc===loc;});if(q)f=f.filter(function(e){return(e.sku||"").toLowerCase().indexOf(q)>=0||(e.color||"").toLowerCase().indexOf(q)>=0||(e.modelo||"").toLowerCase().indexOf(q)>=0;});document.getElementById("rh").textContent=f.length+" resultado"+(f.length!==1?"s":"");var grp={};f.forEach(function(e){if(!grp[e.sku])grp[e.sku]={sku:e.sku,mod:e.modelo,tal:e.talle,col:e.color,desc:e.desc,locs:[]};grp[e.sku].locs.push({loc:e.loc,qty:e.qty,id:e.id});});var items=Object.values(grp),el=document.getElementById("res"),out="";if(!items.length){el.innerHTML="<div class=\"empty\">Sin resultados</div>";return;}items.forEach(function(g){var foto=gf(g.sku);var imgH=foto?"<img src=\""+foto+"\" class=\"card-img\" onclick=\"openFoto(this.src)\">":"<div class=\"card-img-ph\">&#128247;</div>";var bdg="";g.locs.forEach(function(l){bdg+="<span class=\"badge "+lcls(l.loc)+"\">"+l.loc+" x"+l.qty+"</span>";});var ctlH="";g.locs.forEach(function(l){if(SL.indexOf(l.loc)<0)return;var sid="n"+g.sku.replace(/[^a-zA-Z0-9]/g,"Z")+l.loc.replace(/[^a-zA-Z]/g,"Z");ctlH+="<div class=\"ctl\"><span class=\"ctl-lbl\">"+l.loc+"</span><button class=\"qb\" data-sku=\""+g.sku+"\" data-loc=\""+l.loc+"\" data-d=\"-1\" onclick=\"adj(this)\">-</button><span class=\"qn\" id=\""+sid+"\">"+l.qty+"</span><button class=\"qb\" data-sku=\""+g.sku+"\" data-loc=\""+l.loc+"\" data-d=\"1\" onclick=\"adj(this)\">+</button></div>";});var col=(g.col&&g.col!=="nan")?" - "+g.col:"";var dsc=(g.desc&&g.desc!=="nan"&&g.desc!=="")?("<div style=\"font-size:11px;color:#aaa;margin-top:2px\">"+g.desc+"</div>"):"";out+="<div class=\"card\"><div class=\"card-top\"><div><div class=\"card-sku\">"+g.sku+"</div><div class=\"card-sub\">"+(g.mod||"")+" T."+(g.tal||"")+col+"</div>"+dsc+"</div>"+imgH+"</div><div class=\"badges\">"+bdg+"</div>"+(ctlH?"<div class=\"ctls\">"+ctlH+"</div>":"")+"</div>";});el.innerHTML=out;};
window.adj=function(btn){var sku=btn.getAttribute("data-sku"),loc=btn.getAttribute("data-loc"),d=parseInt(btn.getAttribute("data-d"));var e=S.find(function(x){return x.sku===sku&&x.loc===loc;});if(!e)return;var n=e.qty+d;if(n<0){toast("Sin stock");return;}e.qty=n;var sid="n"+sku.replace(/[^a-zA-Z0-9]/g,"Z")+loc.replace(/[^a-zA-Z]/g,"Z");var el=document.getElementById(sid);if(el)el.textContent=n;toast((d>0?"+1":"-1")+" "+sku+" en "+loc);};

window.rendV=function(){var q=(document.getElementById("vq").value||"").toLowerCase();var tA=S.filter(function(e){return e.loc==="Auto";}).reduce(function(a,e){return a+e.qty;},0);var tM=S.filter(function(e){return e.loc==="Muestrario";}).reduce(function(a,e){return a+e.qty;},0);var tD=S.filter(function(e){return e.loc.indexOf("ep")>=0;}).reduce(function(a,e){return a+e.qty;},0);document.getElementById("stats").innerHTML="<div class=\"stat\"><div class=\"stat-n\">"+tA+"</div><div class=\"stat-l\">Auto</div></div><div class=\"stat\"><div class=\"stat-n\">"+tM+"</div><div class=\"stat-l\">Muestrario</div></div><div class=\"stat\"><div class=\"stat-n\">"+tD+"</div><div class=\"stat-l\">Deposito</div></div>";var items=S.filter(function(e){return e.qty>0&&SL.indexOf(e.loc)>=0;}).filter(function(e){return !q||(e.sku+e.color+e.modelo).toLowerCase().indexOf(q)>=0;});if(!items.length){document.getElementById("vlist").innerHTML="<div class=\"empty\">Sin articulos</div>";return;}var out="";items.forEach(function(e){var foto=gf(e.sku);var img=foto?"<img src=\""+foto+"\" onclick=\"openFoto(this.src)\">":"<div class=\"si-ph\">&#128247;</div>";var col=(e.color&&e.color!=="nan")?" - "+e.color:"";out+="<div class=\"si\">"+img+"<div class=\"si-info\"><div class=\"si-sku\">"+e.sku+"</div><div class=\"si-sub\">"+(e.modelo||"")+" T."+(e.talle||"")+col+" - "+e.loc+" - "+e.qty+" unid.</div></div><button class=\"btn-sell\" onclick=\"initSell("+e.id+")\">Vendido</button></div>";});document.getElementById("vlist").innerHTML=out;};
window.initSell=function(id){var item=S.find(function(e){return e.id===id;});if(!item)return;pend=id;var locs=[];S.forEach(function(e){if(e.sku===item.sku&&e.qty>0&&SL.indexOf(e.loc)>=0&&locs.indexOf(e.loc)<0)locs.push(e.loc);});if(locs.length===1){doSell(id,locs[0]);return;}document.getElementById("mod-ttl").textContent="Desde donde salio? "+item.sku;var opts="";locs.forEach(function(l){opts+="<button class=\"modal-btn\" onclick=\"doSell("+id+",+l+)\">"+l+"</button>";});document.getElementById("mod-opts").innerHTML=opts;document.getElementById("modal").style.display="flex";};
